<VirtualHost *:80>
    ServerName static.gigastage.local

    DocumentRoot /var/www/gigastage.local/public

    <Directory /var/www/gigastage.local/public/assets>
        Options -Indexes +FollowSymLinks
        AllowOverride None
        Require all granted

        # Cache long terme pour les assets statiques
        <IfModule mod_expires.c>
            ExpiresActive On
            ExpiresByType text/css             "access plus 1 year"
            ExpiresByType application/javascript "access plus 1 year"
            ExpiresByType image/svg+xml        "access plus 1 year"
            ExpiresByType image/png            "access plus 1 year"
            ExpiresByType image/jpeg           "access plus 1 year"
        </IfModule>

        # Headers de sécurité
        <IfModule mod_headers.c>
            Header set X-Content-Type-Options "nosniff"
            Header set Access-Control-Allow-Origin "https://gigastage.local"
        </IfModule>
    </Directory>

    # Bloquer l'accès à tout sauf /assets
    <Location "/">
        <If "!(%{REQUEST_URI} =~ m#^/assets/#)">
            Require all denied
        </If>
    </Location>

    ErrorLog ${APACHE_LOG_DIR}/static.gigastage.local.error.log
    CustomLog ${APACHE_LOG_DIR}/static.gigastage.local.access.log combined
</VirtualHost>
